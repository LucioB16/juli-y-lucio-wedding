# Sample workflow for building and deploying an Astro site to GitHub Pages
#
# To get started with Astro see: https://docs.astro.build/en/getting-started/
#
name: Deploy Astro site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  repository-projects: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "." # default value when not using subfolders
  # BUILD_PATH: subfolder

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/bun.lock" ]; then
            echo "manager=bun" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=bun" >> $GITHUB_OUTPUT
            echo "lockfile=bun.lock" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
        working-directory: ${{ env.BUILD_PATH }}
      - name: Build with Astro
        run: |
          ${{ steps.detect-package-manager.outputs.runner }} astro build \
            --site "${{ steps.pages.outputs.origin }}" \
            --base "${{ steps.pages.outputs.base_path }}"
        working-directory: ${{ env.BUILD_PATH }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
  update-repo-info:
    name: Update Repository Info
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update README Links
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          # URL without trailing slash
          URL="${PAGE_URL%/}"
          
          if [ -z "$URL" ]; then
            echo "URL is empty, skipping README update."
            exit 0
          fi
          
          # Replace template URLs with this repo's deployed URLs.
          # This handles both plain links and badge links.
          ESCAPED_URL=$(printf '%s' "$URL" | sed 's|&|\\&|g')
          ESCAPED_BUILDER_URL=$(printf '%s' "$URL/config-builder/" | sed 's|&|\\&|g')

          # Replace Config Builder URL first (specific path before root URL).
          sed -i -E "s|https://luciob16\.github\.io/Altare/config-builder/?|$ESCAPED_BUILDER_URL|g" README.md

          # Replace demo/root URL.
          sed -i -E "s|https://luciob16\.github\.io/Altare/?|$ESCAPED_URL/|g" README.md

          # Backward compatibility for old README formats based only on badge text.
          sed -i -E "s|(\[!\[[^]]*Demo[^]]*\]\([^)]+\)\])\([^)]+\)|\1($ESCAPED_URL/)|gi" README.md
          sed -i -E "s|(\[!\[[^]]*Config Builder[^]]*\]\([^)]+\)\])\([^)]+\)|\1($ESCAPED_BUILDER_URL)|gi" README.md
          
          # Check if there are changes
          if git diff --quiet README.md; then
            echo "No changes in README.md needed."
          else
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add README.md
            git commit -m "chore: update README links to deployed site [skip ci]"
            git push
          fi
